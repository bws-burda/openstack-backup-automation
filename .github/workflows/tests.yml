name: Tests

# on:
#   workflow_dispatch:  # Only run manually

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        run: |
          python -m pytest tests/ -v

  lint:
    name: Code Quality (Linting & Formatting)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 src --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings (uses .flake8 config)
          flake8 src --count --exit-zero --statistics

      - name: Check code formatting with black
        run: |
          black --check --diff src/

      - name: Check import sorting with isort
        run: |
          isort --check-only --diff src/

  config-validation:
    name: Configuration Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate example configuration
        run: |
          # Test that the example config can be loaded
          python -c "
          from src.config.manager import ConfigurationManager
          import tempfile
          import shutil
          import os

          # Copy example config to temporary file
          shutil.copy('config.yaml.example', 'test-config.yaml')
          
          # Replace absolute paths with relative paths for CI
          with open('test-config.yaml', 'r') as f:
              content = f.read()
          content = content.replace('/home/ubuntu/openstack-backup-automation/backup.db', './backup.db')
          content = content.replace('/home/ubuntu/openstack-backup-automation/logs/backup-automation.log', './logs/backup-automation.log')
          with open('test-config.yaml', 'w') as f:
              f.write(content)

          # Try to load it (will fail on OpenStack connection, but config should parse)
          try:
              manager = ConfigurationManager()
              config = manager.load_config('test-config.yaml')
              print('✅ Configuration file syntax is valid')
          except Exception as e:
              if 'OpenStack' in str(e) or 'connection' in str(e).lower():
                  print('✅ Configuration syntax valid (OpenStack connection expected to fail in CI)')
              else:
                  raise e
          finally:
              if os.path.exists('test-config.yaml'):
                  os.remove('test-config.yaml')
          "
